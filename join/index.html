<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Join the Team</title>

<style>

body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial,Helvetica,sans-serif;
}

.container{
    width:min(700px,90%);
    margin:100px auto;
}

.back{
    display:inline-block;
    margin-bottom:40px;
    color:rgba(255,255,255,.6);
    text-decoration:none;
    transition:.2s;
}

.back:hover{
    color:white;
}

h1{
    font-size:clamp(48px,8vw,72px);
    font-weight:300;
    margin:0 0 20px;
    letter-spacing:-2px;
}

.description{
    color:rgba(255,255,255,.72);
    font-size:20px;
    line-height:1.7;
    margin-bottom:55px;
}

label{
    display:block;
    margin-bottom:10px;
    font-size:14px;
    letter-spacing:1px;
    color:rgba(255,255,255,.85);
}

input{
    width:100%;
    box-sizing:border-box;

    margin-bottom:28px;

    padding:18px;

    background:#111;
    color:white;

    border:1px solid rgba(255,255,255,.15);
    border-radius:14px;

    font-size:16px;

    transition:.2s;
}

input:focus{
    outline:none;
    border-color:#ff5b94;
}

button{
    margin-top:10px;

    padding:16px 34px;

    border:none;
    border-radius:999px;

    background:white;
    color:black;

    font-size:15px;
    letter-spacing:1px;

    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
}

</style>

</head>

<body>

<div class="container">

<a class="back" href="/">← Back to Home</a>

<h1>Join the Team</h1>

<p class="description">
We're looking for video editors, marketing managers, and other creatives to join the Nusaiba Music team.
Sound like you? Fill this out and we'll get back to you.
</p>

<form action="https://formspree.io/f/maqglpaq" method="POST">

<input type="hidden" name="_subject" value="New Join the Team Application">

<label>Name</label>
<input
    type="text"
    name="name"
    required>

<label>Position of Interest</label>
<input
    type="text"
    name="position"
    required>

<label>Email</label>
<input
    type="email"
    name="_replyto"
    required>

<label>School (optional)</label>
<input
    type="text"
    name="school">

<button type="submit">
Join the Team
</button>

</form>

</div>

</body>
</html>

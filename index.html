<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nusaiba</title>
    <link rel="icon" type="image/png" href="images.png" />

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at center, #2a0d14 0%, #050505 55%, #000 100%);
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
    }

.page {
  padding: 110px 20px 60px;
}

.footer {
  padding: 30px 20px 90px;
  border-top: 1px solid rgba(255,255,255,.12);

  display: flex;
  justify-content: center;
  align-items: center;
  gap: 18px;
}  

    h1 {
      font-size: clamp(32px, 5vw, 60px);
      font-weight: 300;
      margin: 0 0 40px;
      letter-spacing: -4px;
    }

    .card {
      max-width: 1050px;
      margin: 0 auto 35px;
      padding: 26px;
      border-radius: 22px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      background: linear-gradient(135deg, #ff2b68, #e9a0b9);
      box-shadow: 0 0 55px rgba(255, 56, 112, 0.55);
    }

    .tile {
      position: relative;
      height: 290px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,.3);
    }

    .tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

.button {
  position: absolute;
  left: 50%;
  bottom: 18px;
  transform: translateX(-50%);

  padding: 10px 24px;
  border-radius: 999px;

  background: rgba(255, 255, 255, 0.28);
  border: 1px solid rgba(255,255,255,.35);
  backdrop-filter: blur(8px);

  color: white;
  text-decoration: none;
  font-size: 14px;
  letter-spacing: 2px;
  white-space: nowrap;
}

    h2 {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 300;
      margin: 25px 0 22px;
    }

    p {
      max-width: 850px;
      margin: 0 auto;
      color: rgba(255,255,255,.7);
      font-size: 22px;
      line-height: 1.5;
    }

    @media (max-width: 800px) {
      .card {
        grid-template-columns: 1fr;
      }

      .tile {
        height: 330px;
      }

      h1 {
        font-size: 72px;
      }

      p {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

  <main class="page">
    <h1>nusaiba music</h1>

    <section class="card">
            <div class="tile">
        <img src="instagram.jpg" alt="Music studio wall" />
        <a class="button" href="https://www.instagram.com/nusaibatron/">INSTAGRAM</a>
      </div>
      <div class="tile">
        <img src="youtube.jpg" alt="Nusaiba playing guitar" />
        <a class="button" href="https://www.youtube.com/@nusaibatron">YOUTUBE</a>
      </div>


      <div class="tile">
        <img src="spotify.png" alt="Spotify" />
        <a class="button" href="https://open.spotify.com/artist/7qUeg1VPmad5fu1uajKAEi">SPOTIFY</a>
      </div>
    </section>

    <h2>these words are my heart &amp; soul :)</h2>

    <p>
      not for boring, bland people who hate indie pop guitars + a girl singing to mask heartbreak. 
    </p>
  </main>
    <footer class="footer">
  <a href="/join/">Join the Team</a>
  <span>•</span>
  <a href="/book/">Book a Show</a>
</footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book a Show</title>

<style>

body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial,Helvetica,sans-serif;
}

.container{
    width:min(700px,90%);
    margin:100px auto;
}

.back{
    display:inline-block;
    margin-bottom:40px;
    color:rgba(255,255,255,.6);
    text-decoration:none;
    transition:.2s;
}

.back:hover{
    color:white;
}

h1{
    font-size:clamp(48px,8vw,72px);
    font-weight:300;
    margin:0 0 20px;
    letter-spacing:-2px;
}

.description{
    color:rgba(255,255,255,.72);
    font-size:20px;
    line-height:1.7;
    margin-bottom:55px;
}

label{
    display:block;
    margin-bottom:10px;
    font-size:14px;
    letter-spacing:1px;
    color:rgba(255,255,255,.85);
}

input{
    width:100%;
    box-sizing:border-box;
    margin-bottom:28px;
    padding:18px;
    background:#111;
    color:white;
    border:1px solid rgba(255,255,255,.15);
    border-radius:14px;
    font-size:16px;
    transition:.2s;
}

input:focus{
    outline:none;
    border-color:#ff5b94;
}

button{
    margin-top:10px;
    padding:16px 34px;
    border:none;
    border-radius:999px;
    background:white;
    color:black;
    font-size:15px;
    letter-spacing:1px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
}

</style>

</head>

<body>

<div class="container">

<a class="back" href="/">← Back to Home</a>

<h1>Book a Show</h1>

<p class="description">
Interested in having Nusaiba perform at your event? Fill out the form below with the details, and we'll get back to you as soon as possible.
</p>

<form action="https://formspree.io/f/xzdlkjyv" method="POST">

<input type="hidden" name="_subject" value="New Booking Inquiry">

<label>Event Name</label>
<input
    type="text"
    name="event_name"
    required>

<label>Event Date</label>
<input
    type="date"
    name="event_date"
    required>

<label>Performance Duration</label>
<input
    type="text"
    name="duration"
    placeholder="Example: 45 minutes"
    required>

<label>Your Name</label>
<input
    type="text"
    name="contact_name"
    required>

<label>Your Email</label>
<input
    type="email"
    name="_replyto"
    required>

<button type="submit">
Send Booking Request
</button>

</form>

</div>

</body>
</html>
